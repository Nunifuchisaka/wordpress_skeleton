services:
  wordpress:
    image: wordpress:latest
    container_name: wordpress_skeleton
    restart: no
    ports:
      - "8081:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress_user
      WORDPRESS_DB_PASSWORD: wordpress_password
      WORDPRESS_DB_NAME: wordpress_db
    volumes:
      - ./htdocs:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./dist/theme:/var/www/html/wp-content/themes/hoge
      - ./dist/plugin:/var/www/html/wp-content/plugins/hoge
    depends_on:
      - db

  db:
    image: mariadb:10.6
    container_name: wordpress_skeleton_db
    restart: no
    environment:
      MYSQL_DATABASE: wordpress_db
      MYSQL_USER: wordpress_user
      MYSQL_PASSWORD: wordpress_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: